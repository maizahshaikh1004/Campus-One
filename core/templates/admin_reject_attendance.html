<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Reject Attendance Request</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
    font-family:Outfit,sans-serif;
    background:#0a1a1f;
    color:white;
    padding:3rem;
}

.container{
    max-width:600px;
    margin:auto;
    background:rgba(255,255,255,.05);
    border:1px solid rgba(239,68,68,.4);
    border-radius:20px;
    padding:2rem;
}

h2{
    color:#ef4444;
    margin-bottom:1.5rem;
}

textarea{
    width:100%;
    padding:12px;
    border-radius:14px;
    border:1px solid rgba(239,68,68,.3);
    background:rgba(255,255,255,.05);
    color:white;
    margin-bottom:1.5rem;
    resize:none;
    min-height:100px;
}

button{
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:#ef4444;
    color:white;
    font-weight:700;
    cursor:pointer;
}

button:hover{
    background:#dc2626;
}

.error{
    color:#ef4444;
    margin-bottom:1rem;
}
</style>
</head>

<body>

<div class="container">

<h2>❌ Reject Attendance Correction</h2>

<p>
Request ID: <b>{{ request_data.0 }}</b><br>
Attendance ID: <b>{{ request_data.1 }}</b>
</p>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    <label>Reason for Rejection</label>
    <textarea name="remark" required placeholder="Enter rejection reason..."></textarea>

    <button type="submit">Reject Request</button>
</form>

</div>

</body>
</html>
