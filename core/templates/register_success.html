<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registration Submitted - CampusOne</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    transition: background 0.3s ease;
}

/* Dark mode */
body.dark-mode {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
}

/* Success Container */
.success-container {
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.5s ease;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Card */
.success-card {
    background: white;
    border-radius: 16px;
    padding: 3rem 2.5rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    position: relative;
    text-align: center;
}

body.dark-mode .success-card {
    background: #1e293b;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* Success Icon */
.success-icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #10b981 0%, #059669 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    animation: scaleIn 0.5s ease;
}

@keyframes scaleIn {
    0% {
        transform: scale(0);
    }
    50% {
        transform: scale(1.1);
    }
    100% {
        transform: scale(1);
    }
}

.success-icon svg {
    width: 40px;
    height: 40px;
    stroke: white;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
}

/* Content */
.success-content h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 1rem;
}

body.dark-mode .success-content h1 {
    color: #f1f5f9;
}

.success-content p {
    color: #64748b;
    font-size: 1rem;
    line-height: 1.6;
    margin-bottom: 0.75rem;
}

body.dark-mode .success-content p {
    color: #94a3b8;
}

.success-content p:last-of-type {
    margin-bottom: 2rem;
}

/* Status Badge */
.status-badge {
    display: inline-block;
    background: #fef3c7;
    color: #92400e;
    padding: 0.5rem 1rem;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 2rem;
}

body.dark-mode .status-badge {
    background: #78350f;
    color: #fde68a;
}

/* Buttons */
.button-group {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
}

.btn {
    padding: 0.875rem 1.5rem;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 600;
    font-size: 0.95rem;
    transition: all 0.2s;
    display: inline-block;
    text-align: center;
}

.btn-primary {
    background: #2563eb;
    color: white;
}

.btn-primary:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
}

body.dark-mode .btn-primary {
    background: #60a5fa;
    color: #0f172a;
}

body.dark-mode .btn-primary:hover {
    background: #3b82f6;
}

.btn-secondary {
    background: #f1f5f9;
    color: #475569;
}

.btn-secondary:hover {
    background: #e2e8f0;
}

body.dark-mode .btn-secondary {
    background: #334155;
    color: #cbd5e1;
}

body.dark-mode .btn-secondary:hover {
    background: #475569;
}

/* Theme Toggle */
.theme-toggle {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    background: #f1f5f9;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    transition: all 0.3s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.theme-toggle:hover {
    background: #e2e8f0;
    transform: scale(1.05);
}

body.dark-mode .theme-toggle {
    background: #334155;
}

body.dark-mode .theme-toggle:hover {
    background: #475569;
}

/* Back to Home */
.back-home {
    text-align: center;
    margin-top: 1.5rem;
}

.back-home a {
    color: white;
    text-decoration: none;
    font-size: 0.9rem;
    opacity: 0.9;
    transition: opacity 0.2s;
}

.back-home a:hover {
    opacity: 1;
    text-decoration: underline;
}

body.dark-mode .back-home a {
    color: #cbd5e1;
}

/* Responsive */
@media (max-width: 480px) {
    .success-card {
        padding: 2.5rem 2rem;
    }
    
    .success-content h1 {
        font-size: 1.5rem;
    }
}
</style>
</head>
<body>

<div class="success-container">
    <div class="success-card">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
            <span id="themeIcon">🌙</span>
        </button>

        <div class="success-icon">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>

        <div class="success-content">
            <h1>Registration Submitted!</h1>
            
            <p>Your registration request has been successfully submitted to the admin team.</p>
            
            <div class="status-badge">⏳ Pending Approval</div>
            
            <p>You'll receive an email notification once your account is approved. This typically takes 24-48 hours.</p>
            
            <div class="button-group">
                <a href="{% url 'login' %}" class="btn btn-primary">
                    Go to Login
                </a>
                <a href="/" class="btn btn-secondary">
                    Back to Home
                </a>
            </div>
        </div>
    </div>

    
</div>

<script>
// Dark mode toggle functionality
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
const body = document.body;

// Check for saved theme preference or default to light mode
const currentTheme = localStorage.getItem('theme') || 'light';
if (currentTheme === 'dark') {
    body.classList.add('dark-mode');
    themeIcon.textContent = '☀️';
}

// Toggle theme on button click
themeToggle.addEventListener('click', () => {
    body.classList.toggle('dark-mode');
    
    // Update icon and save preference
    if (body.classList.contains('dark-mode')) {
        themeIcon.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
    } else {
        themeIcon.textContent = '🌙';
        localStorage.setItem('theme', 'light');
    }
});
</script>

</body>
</html>
