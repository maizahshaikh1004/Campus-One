<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access Denied - CampusOne</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f8f9fa;
    color: #1e293b;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
}

.error-container {
    max-width: 500px;
    text-align: center;
}

.error-icon {
    width: 120px;
    height: 120px;
    margin: 0 auto 2rem;
    background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 4rem;
    box-shadow: 0 8px 24px rgba(239,68,68,0.2);
}

.error-code {
    font-size: 5rem;
    font-weight: 700;
    color: #ef4444;
    line-height: 1;
    margin-bottom: 1rem;
}

.error-title {
    font-size: 1.75rem;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 1rem;
}

.error-message {
    font-size: 1rem;
    color: #64748b;
    margin-bottom: 2rem;
    line-height: 1.6;
}

.error-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
}

.btn {
    padding: 0.875rem 1.5rem;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
}

.btn-primary {
    background: #2563eb;
    color: white;
}

.btn-primary:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(37,99,235,0.3);
}

.btn-secondary {
    background: #f1f5f9;
    color: #475569;
}

.btn-secondary:hover {
    background: #e2e8f0;
}

@media (max-width: 500px) {
    .error-code { font-size: 4rem; }
    .error-title { font-size: 1.5rem; }
    .error-actions { flex-direction: column; }
    .btn { width: 100%; justify-content: center; }
}
</style>
</head>
<body>

<div class="error-container">
    <div class="error-icon">🔒</div>
    <div class="error-code">403</div>
    <h1 class="error-title">Access Denied</h1>
    <p class="error-message">
        {{ message|default:"You don't have permission to access this resource." }}
    </p>
    <div class="error-actions">
        <a href="javascript:history.back()" class="btn btn-secondary">
            <span>←</span>
            <span>Go Back</span>
        </a>
        
        <a href="
        {% if request.session.role == 'ADMIN' %}{% url 'admin_dashboard' %}
        {% elif request.session.role == 'FACULTY' %}{% url 'faculty_dashboard' %}
        {% else %}{% url 'student_dashboard' %}{% endif %}
        " class="btn btn-primary">
            <span>🏠</span>
            <span>Dashboard</span>
        </a>
    </div>
</div>

</body>
</html>
