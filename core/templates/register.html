<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusOne | Register</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    transition: background 0.3s ease;
}

/* Dark mode */
body.dark-mode {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
}

/* Register Container */
.register-container {
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.5s ease;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Card */
.register-card {
    background: white;
    border-radius: 16px;
    padding: 2.5rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    position: relative;
}

body.dark-mode .register-card {
    background: #1e293b;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* Logo/Header */
.register-header {
    text-align: center;
    margin-bottom: 2rem;
}

.brand {
    font-size: 1.5rem;
    font-weight: 700;
    color: #2563eb;
    margin-bottom: 0.5rem;
}

body.dark-mode .brand {
    color: #60a5fa;
}

.register-header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 0.5rem;
}

body.dark-mode .register-header h1 {
    color: #f1f5f9;
}

.register-header p {
    color: #64748b;
    font-size: 0.95rem;
}

body.dark-mode .register-header p {
    color: #94a3b8;
}

/* Form */
.register-form {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

label {
    font-size: 0.9rem;
    font-weight: 500;
    color: #475569;
}

body.dark-mode label {
    color: #cbd5e1;
}

input, select {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.95rem;
    color: #1e293b;
    background: white;
    transition: all 0.2s;
}

body.dark-mode input,
body.dark-mode select {
    background: #334155;
    border: 1px solid #475569;
    color: #f1f5f9;
}

input:focus,
select:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

body.dark-mode input:focus,
body.dark-mode select:focus {
    border-color: #60a5fa;
    box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
}

input::placeholder {
    color: #94a3b8;
}

select option {
    background: white;
    color: #1e293b;
}

body.dark-mode select option {
    background: #334155;
    color: #f1f5f9;
}

/* Student Fields */
#studentFields {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.4s ease, opacity 0.4s ease, margin 0.4s ease;
}

#studentFields.show {
    max-height: 500px;
    opacity: 1;
    margin-top: 0;
}

/* Button */
.btn-register {
    width: 100%;
    padding: 0.875rem;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
}

.btn-register:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
}

body.dark-mode .btn-register {
    background: #60a5fa;
    color: #0f172a;
}

body.dark-mode .btn-register:hover {
    background: #3b82f6;
}

/* Links */
.form-footer {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #e2e8f0;
}

body.dark-mode .form-footer {
    border-top: 1px solid #334155;
}

.form-footer p {
    color: #64748b;
    font-size: 0.9rem;
}

body.dark-mode .form-footer p {
    color: #94a3b8;
}

.form-footer a {
    color: #2563eb;
    text-decoration: none;
    font-weight: 600;
}

body.dark-mode .form-footer a {
    color: #60a5fa;
}

.form-footer a:hover {
    text-decoration: underline;
}

/* Theme Toggle */
.theme-toggle {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    background: #f1f5f9;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    transition: all 0.3s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.theme-toggle:hover {
    background: #e2e8f0;
    transform: scale(1.05);
}

body.dark-mode .theme-toggle {
    background: #334155;
}

body.dark-mode .theme-toggle:hover {
    background: #475569;
}

/* Back to Home */
.back-home {
    text-align: center;
    margin-top: 1.5rem;
}

.back-home a {
    color: white;
    text-decoration: none;
    font-size: 0.9rem;
    opacity: 0.9;
    transition: opacity 0.2s;
}

.back-home a:hover {
    opacity: 1;
    text-decoration: underline;
}

body.dark-mode .back-home a {
    color: #cbd5e1;
}

/* Responsive */
@media (max-width: 480px) {
    .register-card {
        padding: 2rem 1.5rem;
    }
    
    .register-header h1 {
        font-size: 1.5rem;
    }
}
</style>
</head>
<body>

<div class="register-container">
    <div class="register-card">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
            <span id="themeIcon">🌙</span>
        </button>

        <div class="register-header">
            <div class="brand">CampusOne</div>
            <h1>Create Account</h1>
            <p>Fill in your details to get started</p>
        </div>

        <form method="post" class="register-form">
            {% csrf_token %}

            <div class="form-group">
                <label for="name">Full Name</label>
                <input 
                    type="text" 
                    id="name"
                    name="name" 
                    placeholder="John Doe" 
                    required
                    autocomplete="name"
                >
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email"
                    name="email" 
                    placeholder="you@example.com" 
                    required
                    autocomplete="email"
                >
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <select name="role" id="role" onchange="handleRoleChange()" required>
                    <option value="">Select your role</option>
                    <option value="STUDENT">Student</option>
                    <option value="FACULTY">Faculty</option>
                </select>
            </div>

            <div class="form-group">
                <label for="department">Department</label>
                <select name="department_id" id="department" required>
                    <option value="">Select department</option>
                    {% for d in departments %}
                    <option value="{{ d.0 }}">{{ d.1 }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- STUDENT FIELDS -->
            <div id="studentFields">
                <div class="form-group">
                    <label for="class">Class</label>
                    <select name="class_id" id="class" disabled>
                        <option value="">Select class</option>
                        {% for c in classes %}
                        <option value="{{ c.0 }}">{{ c.1 }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="semester">Semester</label>
                    <select name="semester_id" id="semester" disabled>
                        <option value="">Select semester</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-register">
                Create Account
            </button>
        </form>

        <div class="form-footer">
            <p>Already have an account? <a href="{% url 'login' %}">Sign in</a></p>
        </div>
    </div>

    <div class="back-home">
        <a href="/">← Back to Home</a>
    </div>
</div>

<script>
// Dark mode toggle functionality
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
const body = document.body;

// Check for saved theme preference or default to light mode
const currentTheme = localStorage.getItem('theme') || 'light';
if (currentTheme === 'dark') {
    body.classList.add('dark-mode');
    themeIcon.textContent = '☀️';
}

// Toggle theme on button click
themeToggle.addEventListener('click', () => {
    body.classList.toggle('dark-mode');
    
    // Update icon and save preference
    if (body.classList.contains('dark-mode')) {
        themeIcon.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
    } else {
        themeIcon.textContent = '🌙';
        localStorage.setItem('theme', 'light');
    }
});

// Role change handler
function handleRoleChange() {
    const role = document.getElementById('role').value;
    const studentFields = document.getElementById('studentFields');
    const classSelect = document.getElementById('class');
    const semSelect = document.getElementById('semester');

    if (role === 'STUDENT') {
        studentFields.classList.add('show');
        classSelect.disabled = true;
        semSelect.disabled = true;
    } else {
        studentFields.classList.remove('show');
        classSelect.value = '';
        semSelect.value = '';
    }
}

/* Department → Classes */
document.getElementById('department').addEventListener('change', function () {
    const deptId = this.value;
    const classSelect = document.getElementById('class');
    const semSelect = document.getElementById('semester');

    classSelect.innerHTML = '<option value="">Select class</option>';
    semSelect.innerHTML = '<option value="">Select semester</option>';
    classSelect.disabled = true;
    semSelect.disabled = true;

    if (!deptId) return;

    fetch(`/ajax/get-classes/?department_id=${deptId}`)
        .then(res => res.json())
        .then(data => {
            data.classes.forEach(c => {
                classSelect.innerHTML += `<option value="${c[0]}">${c[1]}</option>`;
            });

            if (data.classes.length > 0) {
                classSelect.disabled = false;
            }
        });
});

/* Class → Semesters */
document.getElementById('class').addEventListener('change', function () {
    const classId = this.value;
    const semSelect = document.getElementById('semester');

    semSelect.innerHTML = '<option value="">Select semester</option>';
    semSelect.disabled = true;

    if (!classId) return;

    fetch(`/ajax/get-semesters-by-class/?class_id=${classId}`)
        .then(res => res.json())
        .then(data => {
            data.semesters.forEach(s => {
                semSelect.innerHTML +=
                    `<option value="${s[0]}">Semester ${s[1]}</option>`;
            });

            if (data.semesters.length > 0) {
                semSelect.disabled = false;
            }
        });
});
</script>

</body>
</html>
