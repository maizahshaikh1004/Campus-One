<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Profile</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0a1a1f;
    --glass: rgba(255,255,255,0.06);
    --border: rgba(34,211,238,.25);
    --cyan: #22d3ee;
    --teal: #14b8a6;
    --green: #22c55e;
    --red: #ef4444;
    --text: #fff;
    --muted: #94a9b8;
}

* { margin:0; padding:0; box-sizing:border-box }

body {
    font-family: Outfit, sans-serif;
    background: var(--bg);
    color: var(--text);
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 3rem;
}

/* ---------- HEADER ---------- */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
}

.header h2 {
    font-size: 1.8rem;
    font-weight: 800;
}

.back {
    color: var(--cyan);
    text-decoration: none;
    font-weight: 700;
}

/* ---------- CARD ---------- */
.card {
    background: rgba(13,40,51,.6);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 2.5rem;
}

/* ---------- PROFILE PHOTO ---------- */
.photo-wrap {
    display: flex;
    align-items: center;
    gap: 2rem;
    margin-bottom: 2rem;
}

.avatar {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--border);
}

/* ---------- FORM ---------- */
form label {
    font-size: .85rem;
    color: var(--muted);
    font-weight: 600;
}

input, textarea {
    width: 100%;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    margin-bottom: 1.5rem;
    font-family: Outfit, sans-serif;
}

textarea {
    resize: none;
}

/* ---------- ACTIONS ---------- */
.actions {
    display: flex;
    gap: 1.5rem;
    margin-top: 1rem;
}

.save {
    padding: 10px 24px;
    border-radius: 20px;
    border: none;
    font-weight: 800;
    background: linear-gradient(135deg, var(--cyan), var(--teal));
    color: #000;
    cursor: pointer;
}

.cancel {
    color: var(--muted);
    text-decoration: none;
    font-weight: 700;
}

/* ---------- MESSAGES ---------- */
.success { color: var(--green); margin-bottom: 1rem; }
.error { color: var(--red); margin-bottom: 1rem; }

/* ---------- RESPONSIVE ---------- */
@media(max-width:700px){
    .photo-wrap {
        flex-direction: column;
        text-align: center;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>✏ Edit Profile</h2>
        <a href="{% url 'profile' %}" class="back">← Back</a>
    </div>

    <div class="card">

        <!-- 🔔 Messages -->
        {% if messages %}
            {% for message in messages %}
                <p class="{{ message.tags }}"><b>{{ message }}</b></p>
            {% endfor %}
        {% endif %}

        <!-- 📸 PROFILE PHOTO -->
        <div class="photo-wrap">
            {% if profile and profile.0 %}
                <img src="/media/{{ profile.0 }}" class="avatar">
            {% else %}
                <img src="https://via.placeholder.com/130?text=No+Photo" class="avatar">
            {% endif %}
        </div>

        <!-- FORM -->
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            <label>Profile Photo</label>
            <input type="file" name="profile_photo" accept="image/*">

            <label>Phone Number</label>
            <input type="tel"
                   name="phone"
                   value="{{ profile.1|default:'' }}"
                   pattern="[0-9]{10}"
                   maxlength="10"
                   required>

            <label>Address</label>
            <textarea name="address" rows="3">{{ profile.2|default:'' }}</textarea>

            <label>Bio</label>
            <textarea name="bio" rows="4">{{ profile.3|default:'' }}</textarea>

            <div class="actions">
                <button type="submit" class="save">💾 Save Profile</button>
                <a href="{% url 'profile' %}" class="cancel">Cancel</a>
            </div>
        </form>

    </div>

</div>

</body>
</html>
