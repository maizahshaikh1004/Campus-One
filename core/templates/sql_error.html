<!DOCTYPE html>
<html>
<head>
<title>Error</title>
<style>
body {
    font-family: Arial;
    background: #0a1a1f;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.card {
    background: rgba(13,40,51,.8);
    padding: 2rem;
    border-radius: 20px;
    border: 1px solid rgba(239,68,68,.4);
}
.error {
    color: #ef4444;
    font-weight: bold;
}
a {
    color: #22d3ee;
}
</style>
</head>
<body>

<div class="card">
    <h2>⚠ Something went wrong</h2>
    <p class="error">{{ error }}</p>
    <br>
    <a href="javascript:history.back()">← Go Back</a>
</div>

</body>
</html>
