<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusOne | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    transition: background 0.3s ease;
}

/* Dark mode */
body.dark-mode {
    background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
}

/* Login Container */
.login-container {
    width: 100%;
    max-width: 420px;
    animation: slideUp 0.5s ease;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Card */
.login-card {
    background: white;
    border-radius: 16px;
    padding: 2.5rem;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    position: relative;
}

body.dark-mode .login-card {
    background: #1e293b;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}

/* Logo/Header */
.login-header {
    text-align: center;
    margin-bottom: 2rem;
}

.brand {
    font-size: 1.5rem;
    font-weight: 700;
    color: #2563eb;
    margin-bottom: 0.5rem;
}

body.dark-mode .brand {
    color: #60a5fa;
}

.login-header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 0.5rem;
}

body.dark-mode .login-header h1 {
    color: #f1f5f9;
}

.login-header p {
    color: #64748b;
    font-size: 0.95rem;
}

body.dark-mode .login-header p {
    color: #94a3b8;
}

/* Form */
.login-form {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}

label {
    font-size: 0.9rem;
    font-weight: 500;
    color: #475569;
}

body.dark-mode label {
    color: #cbd5e1;
}

input {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.95rem;
    color: #1e293b;
    background: white;
    transition: all 0.2s;
}

body.dark-mode input {
    background: #334155;
    border: 1px solid #475569;
    color: #f1f5f9;
}

input:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

body.dark-mode input:focus {
    border-color: #60a5fa;
    box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
}

input::placeholder {
    color: #94a3b8;
}

/* Button */
.btn-login {
    width: 100%;
    padding: 0.875rem;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 0.5rem;
}

.btn-login:hover {
    background: #1d4ed8;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
}

body.dark-mode .btn-login {
    background: #60a5fa;
    color: #0f172a;
}

body.dark-mode .btn-login:hover {
    background: #3b82f6;
}

/* Links */
.form-footer {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1.5rem;
    border-top: 1px solid #e2e8f0;
}

body.dark-mode .form-footer {
    border-top: 1px solid #334155;
}

.form-footer p {
    color: #64748b;
    font-size: 0.9rem;
}

body.dark-mode .form-footer p {
    color: #94a3b8;
}

.form-footer a {
    color: #2563eb;
    text-decoration: none;
    font-weight: 600;
}

body.dark-mode .form-footer a {
    color: #60a5fa;
}

.form-footer a:hover {
    text-decoration: underline;
}

/* Error Message */
.error-message {
    background: #fee2e2;
    color: #991b1b;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    border-left: 4px solid #ef4444;
    margin-bottom: 1rem;
}

body.dark-mode .error-message {
    background: #7f1d1d;
    color: #fecaca;
    border-left-color: #dc2626;
}

/* Theme Toggle */
.theme-toggle {
    position: absolute;
    top: 1.5rem;
    right: 1.5rem;
    background: #f1f5f9;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    transition: all 0.3s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.theme-toggle:hover {
    background: #e2e8f0;
    transform: scale(1.05);
}

body.dark-mode .theme-toggle {
    background: #334155;
}

body.dark-mode .theme-toggle:hover {
    background: #475569;
}

/* Back to Home */
.back-home {
    text-align: center;
    margin-top: 1.5rem;
}

.back-home a {
    color: white;
    text-decoration: none;
    font-size: 0.9rem;
    opacity: 0.9;
    transition: opacity 0.2s;
}

.back-home a:hover {
    opacity: 1;
    text-decoration: underline;
}

body.dark-mode .back-home a {
    color: #cbd5e1;
}

/* Responsive */
@media (max-width: 480px) {
    .login-card {
        padding: 2rem 1.5rem;
    }
    
    .login-header h1 {
        font-size: 1.5rem;
    }
}
</style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
            <span id="themeIcon">🌙</span>
        </button>

        <div class="login-header">
            <div class="brand">CampusOne</div>
            <h1>Welcome Back</h1>
            <p>Sign in to continue to your account</p>
        </div>

        {% if error %}
        <div class="error-message">
            {{ error }}
        </div>
        {% endif %}

        <form method="post" class="login-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email"
                    name="email" 
                    placeholder="you@example.com" 
                    required
                    autocomplete="email"
                >
            </div>

            <button type="submit" class="btn-login">
                Sign In
            </button>
        </form>

        <div class="form-footer">
            <p>Don't have an account? <a href="{% url 'register' %}">Create one</a></p>
        </div>
    </div>

    <div class="back-home">
        <a href="/">← Back to Home</a>
    </div>
</div>

<script>
// Dark mode toggle functionality
const themeToggle = document.getElementById('themeToggle');
const themeIcon = document.getElementById('themeIcon');
const body = document.body;

// Check for saved theme preference or default to light mode
const currentTheme = localStorage.getItem('theme') || 'light';
if (currentTheme === 'dark') {
    body.classList.add('dark-mode');
    themeIcon.textContent = '☀️';
}

// Toggle theme on button click
themeToggle.addEventListener('click', () => {
    body.classList.toggle('dark-mode');
    
    // Update icon and save preference
    if (body.classList.contains('dark-mode')) {
        themeIcon.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
    } else {
        themeIcon.textContent = '🌙';
        localStorage.setItem('theme', 'light');
    }
});
</script>

</body>
</html>
